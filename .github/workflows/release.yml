name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC for npm Trusted Publishing — no stored token needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) requires a recent npm; the one bundled with
      # node 20 is too old to exchange the OIDC token.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      # When changeset files are present, this opens/updates a "Version
      # Packages" PR. When there are none (versions already bumped), it runs
      # the publish command — authenticated via OIDC, no NPM_TOKEN.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true" # verifiable build attestation
